server {
    listen 80;
    server_name ec2-18-119-235-98.us-east-2.compute.amazonaws.com;

    root /var/www/html;
    index index.php index.html;

    location = /external_site {
        return 302 /external_site/index.php;
    }

    location /external_site/ {
        index index.php index.html;
        try_files $uri $uri/ /external_site/index.php?$query_string;
    }

    location / {
        try_files $uri /index.php /external_site/index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }
}
